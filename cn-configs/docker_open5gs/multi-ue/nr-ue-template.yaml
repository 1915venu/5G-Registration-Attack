# version: '3'
name: reg_attack
services:
  nr_ue:
    image: docker_ueransim
    container_name: nr_ue
    # command: sleep infinity
    env_file:
      - ../.env
    stdin_open: true
    # tty: true
    volumes:
      - ../multi-ue:/mnt/multi-ue
      - ./ueransim_image_init.sh:/ueransim_image_init.sh
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - COMPONENT_NAME=ueransim-ue
      - CONFIG_PATH=/UERANSIM/config
      - BIN_PATH=/UERANSIM/build
      - CURR_SUPI=001010123450001
    expose:
      - "4997/udp"
    cap_add:
      - NET_ADMIN
    privileged: true
    networks:
      default:
        ipv4_address: ${NR_UE_IP}
    # mem_limit: 256m
    # cpus: 1.0
networks:
  default:
    name: docker_open5gs_default
    external: true
