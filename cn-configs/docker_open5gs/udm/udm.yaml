logger:
  file:
    path: /open5gs/install/var/log/open5gs/udm.log

sbi:
  server:
    no_tls: false
  client:
    no_tls: false

global:
  max:
    ue: MAX_NUM_UE

udm:
  hnet:
    - id: 1
      scheme: 1
      key: /open5gs/install/etc/open5gs/hnet/curve25519-1.key
    - id: 2
      scheme: 2
      key: /open5gs/install/etc/open5gs/hnet/secp256r1-2.key
  default:
    tls:
      server:
        scheme: https
        private_key: /open5gs/install/etc/open5gs/tls/udm.key
        cert: /open5gs/install/etc/open5gs/tls/udm.crt
        verify_client: true
        verify_client_cacert: /open5gs/install/etc/open5gs/tls/ca.crt
      client:
        scheme: https
        cacert: /open5gs/install/etc/open5gs/tls/ca.crt
        client_private_key: /open5gs/install/etc/open5gs/tls/udm.key
        client_cert: /open5gs/install/etc/open5gs/tls/udm.crt
  sbi:
    server:
      - address: udm.localdomain
        port: 443
    client:
      nrf:
        - uri: https://nrf.localdomain:443
