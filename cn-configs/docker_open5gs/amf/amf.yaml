logger:
  file:
    path: /open5gs/install/var/log/open5gs/amf.log

sbi:
  server:
    no_tls: false
  client:
    no_tls: false

global:
  max:
    ue: MAX_NUM_UE

amf:
  default:
    tls:
      server:
        scheme: https
        private_key: /open5gs/install/etc/open5gs/tls/amf.key
        cert: /open5gs/install/etc/open5gs/tls/amf.crt
        verify_client: true
        verify_client_cacert: /open5gs/install/etc/open5gs/tls/ca.crt
      client:
        scheme: https
        cacert: /open5gs/install/etc/open5gs/tls/ca.crt
        client_private_key: /open5gs/install/etc/open5gs/tls/amf.key
        client_cert: /open5gs/install/etc/open5gs/tls/amf.crt
  sbi:
    server:
      - address: amf.localdomain
        port: 443
    client:
      nrf:
        - uri: https://nrf.localdomain:443
  ngap:
    server:
      - address: AMF_IP
  guami:
    - plmn_id:
        mcc: MCC
        mnc: MNC
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: MCC
        mnc: MNC
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: MCC
        mnc: MNC
      s_nssai:
        - sst: 1
  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]
  network_name:
    full: Open5GS
  amf_name: open5gs-amf0
  metrics:
    server:
      - address: AMF_IP
        port: 9091
  time:
    t3512:
      value: 540
