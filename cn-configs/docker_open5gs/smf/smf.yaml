logger:
  file:
    path: /open5gs/install/var/log/open5gs/smf.log

sbi:
  server:
    no_tls: false
  client:
    no_tls: false

global:
  max:
    ue: MAX_NUM_UE
  parameter:
    no_ipv4v6_local_addr_in_packet_filter: true

smf:
  freeDiameter: /open5gs/install/etc/freeDiameter/smf.conf
  default:
    tls:
      server:
        scheme: https
        private_key: /open5gs/install/etc/open5gs/tls/smf.key
        cert: /open5gs/install/etc/open5gs/tls/smf.crt
        verify_client: true
        verify_client_cacert: /open5gs/install/etc/open5gs/tls/ca.crt
      client:
        scheme: https
        cacert: /open5gs/install/etc/open5gs/tls/ca.crt
        client_private_key: /open5gs/install/etc/open5gs/tls/smf.key
        client_cert: /open5gs/install/etc/open5gs/tls/smf.crt
  sbi:
    server:
      - address: smf.localdomain
        port: 443
    client:
      nrf:
        - uri: https://nrf.localdomain:443
  gtpc:
    server:
      - address: smf.localdomain
  gtpu:
    server:
      - address: smf.localdomain
  pfcp:
    server:
      - address: smf.localdomain
    client:
      upf:
        - address: UPF_IP
  session:
    - subnet: UE_IPV4_INTERNET_SUBNET
      gateway: UE_IPV4_INTERNET_TUN_IP
      dnn: internet
    - subnet: 2001:230:cafe::/48
      gateway: 2001:230:cafe::1
      dnn: internet
    - subnet: UE_IPV4_IMS_SUBNET
      gateway: UE_IPV4_IMS_TUN_IP
      dnn: ims
    - subnet: 2001:230:babe::/48
      gateway: 2001:230:babe::1
      dnn: ims
  dns:
    - SMF_DNS1
    - SMF_DNS2
    - 2001:4860:4860::8888
    - 2001:4860:4860::8844
  p-cscf:
    - PCSCF_IP
  mtu: 1450
  metrics:
    server:
      - address: smf.localdomain
        port: 9091
